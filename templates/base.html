<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="repo-radar — cross-reference dashboard for repository monitoring">
    <title>{% block title %}repo-radar{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="h-full bg-gray-900 text-gray-100 antialiased">
    <nav class="border-b border-gray-700 bg-gray-800">
        <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
            <div class="flex h-14 items-center justify-between">
                <a href="/" class="text-lg font-bold tracking-tight text-indigo-400">repo-radar</a>
                <div class="flex space-x-6 text-sm font-medium">
                    <a href="/" class="text-gray-300 hover:text-white transition-colors">Dashboard</a>
                    <a href="/config" class="text-gray-300 hover:text-white transition-colors">Config</a>
                    <a href="/reports" class="text-gray-300 hover:text-white transition-colors">Reports</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
