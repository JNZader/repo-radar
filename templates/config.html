{% extends "base.html" %}

{% block title %}Configuration — repo-radar{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-white">Configuration</h1>
        <a href="/api/config"
           class="rounded-md border border-gray-600 bg-gray-800 px-3 py-1.5 text-sm text-gray-300 hover:bg-gray-700 transition-colors">
            View as JSON
        </a>
    </div>

    {% for section in sections %}
    <div class="rounded-lg border border-gray-700 bg-gray-800 overflow-hidden">
        <div class="border-b border-gray-700 bg-gray-750 px-4 py-3">
            <h2 class="text-lg font-semibold text-indigo-400">{{ section.title }}</h2>
        </div>
        <div class="divide-y divide-gray-700">
            {% for entry in section.entries %}
            <div class="flex items-center justify-between px-4 py-3">
                <span class="text-sm font-medium text-gray-400">{{ entry.key }}</span>
                <span class="text-sm text-gray-200 font-mono max-w-md truncate" title="{{ entry.value }}">
                    {{ entry.value }}
                </span>
            </div>
            {% endfor %}
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
